<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1614"/>
      <stop offset="100%" style="stop-color:#2D2520"/>
    </linearGradient>
    <linearGradient id="fistL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8A86D"/>
      <stop offset="100%" style="stop-color:#C47A3A"/>
    </linearGradient>
    <linearGradient id="fistR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8A86D"/>
      <stop offset="100%" style="stop-color:#C47A3A"/>
    </linearGradient>
    <radialGradient id="impact" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFD27A;stop-opacity:0.9"/>
      <stop offset="60%" style="stop-color:#FFD27A;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#FFD27A;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>

  <!-- Subtle ring -->
  <circle cx="256" cy="220" r="120" fill="none" stroke="rgba(255,210,122,0.08)" stroke-width="2"/>

  <!-- Impact burst -->
  <circle cx="256" cy="210" r="45" fill="url(#impact)"/>

  <!-- Impact lines -->
  <g stroke="#FFD27A" stroke-width="3" stroke-linecap="round" opacity="0.8">
    <line x1="256" y1="165" x2="256" y2="148"/>
    <line x1="286" y1="175" x2="298" y2="162"/>
    <line x1="226" y1="175" x2="214" y2="162"/>
    <line x1="295" y1="200" x2="310" y2="195"/>
    <line x1="217" y1="200" x2="202" y2="195"/>
    <line x1="280" y1="235" x2="292" y2="245"/>
    <line x1="232" y1="235" x2="220" y2="245"/>
  </g>

  <!-- Left fist (coming from left) -->
  <g transform="translate(120, 180)">
    <!-- Wrist/arm -->
    <rect x="-10" y="18" width="50" height="32" rx="14" fill="url(#fistL)"/>
    <!-- Main fist body -->
    <rect x="25" y="5" width="55" height="58" rx="16" fill="url(#fistL)"/>
    <!-- Thumb -->
    <rect x="20" y="40" width="28" height="18" rx="9" fill="#D4956A"/>
    <!-- Finger lines -->
    <line x1="35" y1="18" x2="70" y2="18" stroke="#B5723A" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="35" y1="28" x2="72" y2="28" stroke="#B5723A" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="35" y1="38" x2="70" y2="38" stroke="#B5723A" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <!-- Knuckle highlights -->
    <circle cx="72" cy="14" r="5" fill="#F0C28B" opacity="0.5"/>
    <circle cx="72" cy="24" r="5" fill="#F0C28B" opacity="0.5"/>
    <circle cx="72" cy="34" r="5" fill="#F0C28B" opacity="0.5"/>
    <circle cx="70" cy="44" r="4" fill="#F0C28B" opacity="0.5"/>
  </g>

  <!-- Right fist (coming from right, mirrored) -->
  <g transform="translate(392, 180) scale(-1,1)">
    <!-- Wrist/arm -->
    <rect x="-10" y="18" width="50" height="32" rx="14" fill="url(#fistR)"/>
    <!-- Main fist body -->
    <rect x="25" y="5" width="55" height="58" rx="16" fill="url(#fistR)"/>
    <!-- Thumb -->
    <rect x="20" y="40" width="28" height="18" rx="9" fill="#D4956A"/>
    <!-- Finger lines -->
    <line x1="35" y1="18" x2="70" y2="18" stroke="#B5723A" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="35" y1="28" x2="72" y2="28" stroke="#B5723A" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="35" y1="38" x2="70" y2="38" stroke="#B5723A" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <!-- Knuckle highlights -->
    <circle cx="72" cy="14" r="5" fill="#F0C28B" opacity="0.5"/>
    <circle cx="72" cy="24" r="5" fill="#F0C28B" opacity="0.5"/>
    <circle cx="72" cy="34" r="5" fill="#F0C28B" opacity="0.5"/>
    <circle cx="70" cy="44" r="4" fill="#F0C28B" opacity="0.5"/>
  </g>

  <!-- "BRO" text -->
  <text x="256" y="340" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="62" font-weight="800" fill="#FFFFFF" letter-spacing="8">BRO</text>

  <!-- "DO IT" text with accent -->
  <text x="256" y="395" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="700" fill="#FFD27A" letter-spacing="4" filter="url(#glow)">DO IT</text>

  <!-- Small tagline dot -->
  <circle cx="256" cy="420" r="4" fill="#3DAE5C"/>
</svg>
